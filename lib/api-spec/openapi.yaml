openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Deriv AI Market Analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data and candles
  - name: indicators
    description: Technical indicator values
  - name: analysis
    description: AI analysis and predictions
  - name: predictions
    description: Stored predictions and outcomes
  - name: memory
    description: AI learning memory
  - name: ai
    description: AI inference and status
  - name: scanner
    description: Multi-market opportunity scanner and ranking
  - name: analytics
    description: Behavioral market analytics, symbol profiling, and timing intelligence
  - name: intelligence
    description: Autonomous background intelligence collection and aggregated market memory

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /market/symbols:
    get:
      operationId: getMarketSymbols
      tags: [market]
      summary: Get available market symbols
      responses:
        "200":
          description: List of available symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketSymbol"

  /market/candles:
    get:
      operationId: getCandles
      tags: [market]
      summary: Get historical candles for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            default: 60
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Candle data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /market/ticks:
    get:
      operationId: getRecentTicks
      tags: [market]
      summary: Get recent ticks for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: count
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Tick data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tick"

  /market/summary:
    get:
      operationId: getMarketSummary
      tags: [market]
      summary: Get live market summary with all key metrics for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Market summary with trend, volatility, momentum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummary"

  /indicators:
    get:
      operationId: getSymbolIndicators
      tags: [indicators]
      summary: Get all technical indicator values for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: All indicator values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndicatorSet"

  /analysis/generate:
    post:
      operationId: generateAnalysis
      tags: [analysis]
      summary: Generate AI analysis for a symbol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /analysis/latest:
    get:
      operationId: getLatestAnalysis
      tags: [analysis]
      summary: Get the latest cached AI analysis for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: No analysis found

  /analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get analysis history for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Analysis history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisResult"

  /analysis/signals:
    get:
      operationId: getSignalAnalysis
      tags: [analysis]
      summary: Get merged signal analysis for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Signal merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalAnalysis"

  /analysis/quality:
    get:
      operationId: getSignalQuality
      tags: [analysis]
      summary: Get signal quality assessment with alert classification
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Signal quality result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalQualityResult"

  /predictions:
    get:
      operationId: getPredictions
      tags: [predictions]
      summary: Get prediction records
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"
    post:
      operationId: createPrediction
      tags: [predictions]
      summary: Store a new prediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionInput"
      responses:
        "201":
          description: Created prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"

  /predictions/{id}/outcome:
    patch:
      operationId: updatePredictionOutcome
      tags: [predictions]
      summary: Record the outcome of a prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutcomeUpdate"
      responses:
        "200":
          description: Updated prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"

  /predictions/accuracy:
    get:
      operationId: getPredictionAccuracy
      tags: [predictions]
      summary: Get prediction accuracy stats per symbol
      responses:
        "200":
          description: Accuracy statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccuracyStats"

  /predictions/auto:
    post:
      operationId: autoPrediction
      tags: [predictions]
      summary: Auto-generate a prediction based on current market signals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoPredictRequest"
      responses:
        "200":
          description: Auto-generated prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoPredictionResult"

  /memory:
    get:
      operationId: getMemoryEntries
      tags: [memory]
      summary: Get AI learning memory entries
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryEntry"

  /memory/summary:
    get:
      operationId: getMemorySummary
      tags: [memory]
      summary: Get summarized learning insights from memory
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Memory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySummary"

  /memory/patterns:
    get:
      operationId: getPatternStats
      tags: [memory]
      summary: Get pattern recognition statistics from historical memory
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pattern statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatternStat"

  /memory/lessons:
    get:
      operationId: getMemoryLessons
      tags: [memory]
      summary: Get AI-generated lessons from historical prediction outcomes
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Lessons summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonsSummary"

  /ai/status:
    get:
      operationId: getAiStatus
      tags: [ai]
      summary: Check local AI server status
      responses:
        "200":
          description: AI server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiStatus"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Symbol personality profiles and behavioral analytics
      responses:
        "200":
          description: Analytics overview with all symbol profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverviewResponse"

  /analytics/timeline/{symbol}:
    get:
      operationId: getSymbolTimeline
      tags: [analytics]
      summary: Timeline history for a specific symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timeline entries for the symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolTimelineResponse"

  /analytics/heatmap/{symbol}:
    get:
      operationId: getSymbolHeatmap
      tags: [analytics]
      summary: 24-hour quality heatmap for a specific symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hourly heatmap data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolHeatmapResponse"

  /intelligence/status:
    get:
      operationId: getIntelligenceStatus
      tags: [intelligence]
      summary: Background scanner status, uptime, and collection metrics
      responses:
        "200":
          description: Intelligence system status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceStatus"

  /intelligence/snapshots/{symbol}:
    get:
      operationId: getIntelligenceSnapshots
      tags: [intelligence]
      summary: Recent background-scan snapshots for a symbol (last 200)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intelligence snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceSnapshotsResponse"

  /intelligence/hourly/{symbol}:
    get:
      operationId: getIntelligenceHourly
      tags: [intelligence]
      summary: 24-slot adaptive timing model for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hourly timing windows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimingModelResponse"

  /intelligence/daily/{symbol}:
    get:
      operationId: getIntelligenceDaily
      tags: [intelligence]
      summary: Last 30 days of daily summaries for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Daily summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummaryResponse"

  /intelligence/evolution/{symbol}:
    get:
      operationId: getIntelligenceEvolution
      tags: [intelligence]
      summary: Regime-shift evolution events for a symbol (last 50)
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evolution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvolutionResponse"

  /intelligence/aggregated:
    get:
      operationId: getIntelligenceAggregated
      tags: [intelligence]
      summary: Cross-symbol 7-day aggregated leaderboard
      responses:
        "200":
          description: Aggregated cross-symbol intelligence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregatedIntelligenceResponse"

  /scanner/scan:
    get:
      operationId: getScannerResults
      tags: [scanner]
      summary: Scan all markets and rank by opportunity quality
      parameters:
        - name: granularity
          in: query
          required: false
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Scanner results for all markets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MarketSymbol:
      type: object
      required: [symbol, displayName, market, pip]
      properties:
        symbol:
          type: string
        displayName:
          type: string
        market:
          type: string
        pip:
          type: number

    Candle:
      type: object
      required: [epoch, open, high, low, close]
      properties:
        epoch:
          type: integer
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: ["number", "null"]

    Tick:
      type: object
      required: [epoch, price, symbol]
      properties:
        epoch:
          type: integer
        price:
          type: number
        symbol:
          type: string
        bid:
          type: ["number", "null"]
        ask:
          type: ["number", "null"]

    MarketSummary:
      type: object
      required: [symbol, currentPrice, trend, volatility, momentum, marketCondition, lastUpdated]
      properties:
        symbol:
          type: string
        currentPrice:
          type: number
        priceChange:
          type: number
        priceChangePct:
          type: number
        trend:
          type: string
          enum: [bullish, bearish, neutral, ranging]
        volatility:
          type: string
          enum: [low, medium, high, extreme]
        volatilityValue:
          type: number
        momentum:
          type: string
          enum: [strong_up, up, flat, down, strong_down]
        marketCondition:
          type: string
          enum: [trending, ranging, reversing, uncertain]
        marketState:
          type: ["string", "null"]
        supportLevel:
          type: ["number", "null"]
        resistanceLevel:
          type: ["number", "null"]
        spikeDetected:
          type: boolean
        reversalWarning:
          type: boolean
        lastUpdated:
          type: integer

    IndicatorSet:
      type: object
      required: [symbol, calculatedAt]
      properties:
        symbol:
          type: string
        calculatedAt:
          type: integer
        rsi:
          type: ["number", "null"]
        macdLine:
          type: ["number", "null"]
        macdSignal:
          type: ["number", "null"]
        macdHistogram:
          type: ["number", "null"]
        ema9:
          type: ["number", "null"]
        ema21:
          type: ["number", "null"]
        ema50:
          type: ["number", "null"]
        sma20:
          type: ["number", "null"]
        bollingerUpper:
          type: ["number", "null"]
        bollingerMiddle:
          type: ["number", "null"]
        bollingerLower:
          type: ["number", "null"]
        atr:
          type: ["number", "null"]
        stochasticK:
          type: ["number", "null"]
        stochasticD:
          type: ["number", "null"]
        trendStrength:
          type: ["number", "null"]

    SymbolProfile:
      type: object
      required: [symbol, displayName, market, samplesAnalyzed, personality, avgCleanSignalScore, avgConfidence, volatilityScore, trendReliability, reversalFrequency, cleanSetupFrequency, eliteFrequency, dangerousFrequency, dominantState, dominantAlertType, predictabilityScore, stabilityScore, rhythmScore, recentVol, recentEvolution]
      properties:
        symbol:
          type: string
        displayName:
          type: string
        market:
          type: string
        samplesAnalyzed:
          type: integer
        personality:
          type: string
        avgCleanSignalScore:
          type: integer
        avgConfidence:
          type: integer
        volatilityScore:
          type: integer
        trendReliability:
          type: integer
        reversalFrequency:
          type: integer
        cleanSetupFrequency:
          type: integer
        eliteFrequency:
          type: integer
        dangerousFrequency:
          type: integer
        dominantState:
          type: string
        dominantAlertType:
          type: string
        predictabilityScore:
          type: integer
        stabilityScore:
          type: integer
        rhythmScore:
          type: integer
        recentVol:
          type: integer
        recentEvolution:
          type: array
          items:
            type: string

    AnalyticsOverviewResponse:
      type: object
      required: [profiles, totalSnapshots, symbolsProfiled, lastUpdated]
      properties:
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/SymbolProfile"
        totalSnapshots:
          type: integer
        symbolsProfiled:
          type: integer
        lastUpdated:
          type: integer

    TimelineEntry:
      type: object
      required: [id, snapshotAt, cleanSignalScore, riskScore, confidence, marketState, priorityLevel, alertType, marketCleanliness, volatilityCompatibility, indicatorAlignment, momentumConfirmation, bullishScore, bearishScore, noTradeZone, patternName, hour]
      properties:
        id:
          type: integer
        snapshotAt:
          type: integer
        cleanSignalScore:
          type: integer
        riskScore:
          type: integer
        confidence:
          type: integer
        marketState:
          type: string
        priorityLevel:
          type: string
        alertType:
          type: string
        marketCleanliness:
          type: string
        volatilityCompatibility:
          type: integer
        indicatorAlignment:
          type: integer
        momentumConfirmation:
          type: integer
        bullishScore:
          type: integer
        bearishScore:
          type: integer
        noTradeZone:
          type: boolean
        patternName:
          type: string
        hour:
          type: integer

    SymbolTimelineResponse:
      type: object
      required: [symbol, entries, totalEntries]
      properties:
        symbol:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEntry"
        totalEntries:
          type: integer

    HeatmapSlot:
      type: object
      required: [hour, avgQuality, avgConfidence, sampleCount, eliteCount, dangerousCount, cleanCount]
      properties:
        hour:
          type: integer
        avgQuality:
          type: integer
        avgConfidence:
          type: integer
        sampleCount:
          type: integer
        eliteCount:
          type: integer
        dangerousCount:
          type: integer
        cleanCount:
          type: integer

    SymbolHeatmapResponse:
      type: object
      required: [symbol, slots, hasData, totalSamples]
      properties:
        symbol:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapSlot"
        bestHour:
          type: integer
          nullable: true
        worstHour:
          type: integer
          nullable: true
        hasData:
          type: boolean
        totalSamples:
          type: integer

    SymbolScanResult:
      type: object
      required: [symbol, displayName, market, bullishScore, bearishScore, confidence, marketState, riskLevel, noTradeZone, supportingSignals, conflictingSignals, cleanSignalScore, riskScore, confidenceWeight, indicatorAlignment, momentumConfirmation, volatilityCompatibility, marketCleanliness, setupRarity, alertType, expirySeconds, historicalBoost, patternName, historicalSuccessRate, historicalTrades, priorityLevel]
      properties:
        symbol:
          type: string
        displayName:
          type: string
        market:
          type: string
        bullishScore:
          type: number
        bearishScore:
          type: number
        confidence:
          type: number
        marketState:
          type: string
        riskLevel:
          type: string
        noTradeZone:
          type: boolean
        supportingSignals:
          type: array
          items:
            type: string
        conflictingSignals:
          type: array
          items:
            type: string
        cleanSignalScore:
          type: number
        riskScore:
          type: number
        confidenceWeight:
          type: number
        indicatorAlignment:
          type: number
        momentumConfirmation:
          type: number
        volatilityCompatibility:
          type: number
        marketCleanliness:
          type: string
          enum: [clean, choppy, trending, volatile]
        setupRarity:
          type: string
          enum: [common, moderate, rare, exceptional]
        alertType:
          type: string
        expirySeconds:
          type: integer
        historicalBoost:
          type: number
        patternName:
          type: string
        historicalSuccessRate:
          type: number
        historicalTrades:
          type: integer
        priorityLevel:
          type: string

    ScannerResponse:
      type: object
      required: [scannedAt, totalSymbols, eliteCount, highConfidenceCount, results]
      properties:
        scannedAt:
          type: integer
        totalSymbols:
          type: integer
        eliteCount:
          type: integer
        highConfidenceCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/SymbolScanResult"
        topOpportunity:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true
        bestBullish:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true
        bestBearish:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true
        cleanest:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true
        safest:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true
        mostDangerous:
          $ref: "#/components/schemas/SymbolScanResult"
          nullable: true

    SignalQualityResult:
      type: object
      required: [symbol, bullishScore, bearishScore, confidence, marketState, riskLevel, noTradeZone, supportingSignals, conflictingSignals, cleanSignalScore, riskScore, confidenceWeight, indicatorAlignment, momentumConfirmation, volatilityCompatibility, marketCleanliness, setupRarity, alertType, expirySeconds, historicalBoost, patternName, historicalSuccessRate, historicalTrades]
      properties:
        symbol:
          type: string
        bullishScore:
          type: number
        bearishScore:
          type: number
        confidence:
          type: number
        marketState:
          type: string
        riskLevel:
          type: string
        noTradeZone:
          type: boolean
        supportingSignals:
          type: array
          items:
            type: string
        conflictingSignals:
          type: array
          items:
            type: string
        cleanSignalScore:
          type: number
        riskScore:
          type: number
        confidenceWeight:
          type: number
        indicatorAlignment:
          type: number
        momentumConfirmation:
          type: number
        volatilityCompatibility:
          type: number
        marketCleanliness:
          type: string
          enum: [clean, choppy, trending, volatile]
        setupRarity:
          type: string
          enum: [common, moderate, rare, exceptional]
        alertType:
          type: string
        expirySeconds:
          type: integer
        historicalBoost:
          type: number
        patternName:
          type: string
        historicalSuccessRate:
          type: number
        historicalTrades:
          type: integer

    SignalAnalysis:
      type: object
      required: [symbol, bullishScore, bearishScore, neutralScore, confidence, riskLevel, marketState, supportingSignals, conflictingSignals, noTradeZone]
      properties:
        symbol:
          type: string
        bullishScore:
          type: number
        bearishScore:
          type: number
        neutralScore:
          type: number
        confidence:
          type: number
        riskLevel:
          type: string
          enum: [Low, Medium, High, Extreme]
        marketState:
          type: string
          enum: [Strong Bullish, Weak Bullish, Strong Bearish, Weak Bearish, Ranging, Volatile, Spike Risk, Reversal Watch, Uncertain]
        supportingSignals:
          type: array
          items:
            type: string
        conflictingSignals:
